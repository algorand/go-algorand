name: 'Setup Windows Build Environment'
description: 'Set up msys2, Go, and libsodium for native Windows builds'
runs:
  using: 'composite'
  steps:
    - name: Install msys2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        path-type: inherit
    - name: Set up Go
      uses: ./.github/actions/setup-go
    - name: Restore libsodium from cache
      id: cache-libsodium
      uses: actions/cache@v4
      with:
        path: crypto/libs
        key: libsodium-fork-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('crypto/libsodium-fork/**') }}
    - name: Set Windows-safe GOBIN
      # go env GOPATH returns a Windows path with backslashes, which the shell
      # eats inside make recipes that do `cd $(GOBIN)` / `cp ... $(GOBIN)/x`.
      # cygpath -m rewrites it with forward slashes (e.g. D:/a/.../go/bin), which
      # both Go and the shell accept. Persisted for all later steps in the job.
      shell: msys2 {0}
      run: echo "GOBIN=$(cygpath -m "$(go env GOPATH)")/bin" >> "$GITHUB_ENV"
    - name: Build libsodium
      shell: msys2 {0}
      run: make libsodium
